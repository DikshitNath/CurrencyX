name: Student Website Deployment

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to S3
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          # UPDATE THIS with the exact name of your bucket from Step 1
          AWS_S3_BUCKET: 'my-student-portfolio-123' 
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Verify your bucket's region (us-east-1 is N. Virginia, ap-south-1 is Mumbai, etc.)
          AWS_REGION: 'us-east-1'